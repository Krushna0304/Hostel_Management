spring:
  application:
    name: HostelManagment
  datasource:
    url: jdbc:postgresql://localhost:5432/hostel_management
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/hostel_management}
      database: hostel_management
  jackson:
    serialization:
      fail-on-empty-beans: false
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Twilio SMS Configuration
twilio:
  account-sid: ACfb9ad9b7b4e2b735e1c0c946f1b2a0c1
  auth-token: be51a38acba96b814b127853689f6a87
  phone-number: +1 878 728 0819   # <-- Replace this with your Twilio-assigned number from console.twilio.com
  enabled: true

# Application Configuration
app:
  plan:
    initializer:
      enabled: ${PLAN_INITIALIZER_ENABLED:false}
  frontend:
    url: ${FRONTEND_URL:https://hostel-management-dashboard.onrender.com}
  email:
    enabled: ${EMAIL_ENABLED:false}
  jwt:
    secret: ${JWT_SECRET:your-secret-key-here-make-it-long-and-secure-at-least-256-bits}
    expiration: 86400000
  encryption:
    key: ${ENCRYPTION_KEY:your-encryption-key-here-must-be-32-bytes-for-aes256-encryption}

